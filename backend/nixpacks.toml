[phases.setup]
nixPkgs = ["zlib", "libjpeg", "gcc", "libmysqlclient", "pkg-config"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate && gunicorn autoauction_backend.wsgi --bind 0.0.0.0:$PORT --log-file -"
